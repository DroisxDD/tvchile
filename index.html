<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>TV Chile</title>
<!-- HLS.js versión estable compatible con navegadores TV -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.14/dist/hls.min.js"></script>
<style>
/* ── RESET & BASE ── compatible con Samsung Tizen antiguo ───── */
* { -webkit-box-sizing:border-box; box-sizing:border-box; margin:0; padding:0; }

html, body {
  width:100%; height:100%;
  background:#000;
  color:#fff;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  overflow:hidden;
  cursor:none;
}

/* ── VIDEO FULL SCREEN ──────────────────────────────────────── */
#player {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  width:100%; height:100%;
  background:#000;
  display:block;
  z-index:1;
}

/* ── LOADING ────────────────────────────────────────────────── */
#loading {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:#040608;
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-box-orient:vertical; -webkit-flex-direction:column; flex-direction:column;
  -webkit-box-align:center; -webkit-align-items:center; align-items:center;
  -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center;
  z-index:50;
  gap:18px;
}
#loading.hide { display:none; }

#spinner {
  width:56px; height:56px; border-radius:50%;
  border:3px solid rgba(255,255,255,.12);
  border-top-color:#1E90FF;
  -webkit-animation:spin .7s linear infinite;
  animation:spin .7s linear infinite;
}
#loading-ch {
  font-size:18px; font-weight:700; letter-spacing:4px;
  color:#1E90FF; text-transform:uppercase;
}

/* ── ERROR ──────────────────────────────────────────────────── */
#error-box {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:#040608;
  display:none;
  -webkit-box-orient:vertical; -webkit-flex-direction:column; flex-direction:column;
  -webkit-box-align:center; -webkit-align-items:center; align-items:center;
  -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center;
  z-index:50; gap:14px;
  text-align:center;
}
#error-box.show {
  display:-webkit-box; display:-webkit-flex; display:flex;
}
#error-msg { font-size:15px; color:rgba(255,255,255,.5); line-height:1.6; }
#retry-btn {
  margin-top:10px; padding:11px 30px;
  background:#1E90FF; border:none; border-radius:8px;
  color:#fff; font-size:15px; font-weight:700;
  letter-spacing:2px; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

/* ── BADGE "AHORA VIENDO" (siempre visible, esquina inf-izq) ─ */
#now-badge {
  position:fixed; bottom:24px; left:24px;
  z-index:30;
  -webkit-transition:opacity .4s; transition:opacity .4s;
}
#now-badge-inner {
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-box-align:center; -webkit-align-items:center; align-items:center;
  gap:10px;
  padding:8px 14px 8px 10px;
  background:rgba(0,0,0,.72);
  border-left:3px solid #1E90FF;
  border-radius:0 6px 6px 0;
  -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
}
.live-dot {
  width:8px; height:8px; border-radius:50%;
  background:#1E90FF;
  -webkit-animation:pulse 1.4s ease-in-out infinite;
  animation:pulse 1.4s ease-in-out infinite;
  -webkit-box-shadow:0 0 6px #1E90FF; box-shadow:0 0 6px #1E90FF;
  -webkit-flex-shrink:0; flex-shrink:0;
}
#badge-num {
  font-size:11px; font-weight:700; letter-spacing:2px;
  color:rgba(255,255,255,.4); font-family:monospace;
}
#badge-name {
  font-size:17px; font-weight:700;
  color:#fff; letter-spacing:.5px;
}
#badge-live {
  font-size:9px; font-weight:700; letter-spacing:2px;
  color:#1E90FF; font-family:monospace;
}

/* ── CANAL OVERLAY (aparece al navegar) ─────────────────────── */
#ch-overlay {
  position:fixed; bottom:0; left:0; right:0;
  z-index:40;
  background:-webkit-linear-gradient(top, transparent, rgba(0,0,0,.95));
  background:linear-gradient(to bottom, transparent, rgba(0,0,0,.95));
  padding:60px 0 0;
  -webkit-transform:translateY(100%); transform:translateY(100%);
  -webkit-transition:-webkit-transform .35s ease; transition:transform .35s ease;
}
#ch-overlay.visible {
  -webkit-transform:translateY(0); transform:translateY(0);
}

/* Scrollable channel strip */
#ch-strip {
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-box-align:end; -webkit-align-items:flex-end; align-items:flex-end;
  gap:0;
  overflow:hidden;
  padding:0 0 28px;
}

.ch-card {
  -webkit-flex-shrink:0; flex-shrink:0;
  width:180px;
  padding:14px 16px 16px;
  -webkit-transition:all .22s ease; transition:all .22s ease;
  opacity:.45;
  -webkit-transform:scale(.88); transform:scale(.88);
  -webkit-transform-origin:bottom center; transform-origin:bottom center;
  cursor:pointer;
  position:relative;
}
.ch-card.focused {
  opacity:1;
  -webkit-transform:scale(1.05); transform:scale(1.05);
}
.ch-card.active-ch .ch-card-num { /* active marker */ }

.ch-card-top {
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-box-align:center; -webkit-align-items:center; align-items:center;
  gap:8px; margin-bottom:8px;
}
.ch-card-num {
  font-size:10px; font-family:monospace; font-weight:700;
  letter-spacing:2px; color:rgba(255,255,255,.4);
}
.ch-card-cat {
  font-size:8px; letter-spacing:1.5px; font-weight:700;
  color:rgba(255,255,255,.3);
}
.ch-card-name {
  font-size:24px; font-weight:700;
  line-height:1; color:rgba(255,255,255,.6);
  -webkit-transition:color .2s; transition:color .2s;
  letter-spacing:.5px;
}
.ch-card.focused .ch-card-name { color:#fff; }
.ch-card-sub {
  font-size:11px; color:rgba(255,255,255,.3);
  margin-top:3px;
}
/* Accent line at bottom of focused card */
.ch-card-line {
  position:absolute; bottom:0; left:16px; right:16px;
  height:2px; border-radius:2px;
  background:transparent;
  -webkit-transition:background .2s; transition:background .2s;
}
.ch-card.focused .ch-card-line { background:#1E90FF; }

/* ── LOGO TV (siempre visible esquina sup-izq) ──────────────── */
#tv-logo {
  position:fixed; top:20px; left:22px;
  z-index:30;
  background:-webkit-linear-gradient(left, #002060, #1E90FF);
  background:linear-gradient(to right, #002060, #1E90FF);
  border-radius:7px; padding:5px 15px;
  font-size:15px; font-weight:700; letter-spacing:3px;
  pointer-events:none;
}

/* Reloj esquina sup-der */
#clock-box {
  position:fixed; top:16px; right:22px;
  z-index:30; text-align:right;
  pointer-events:none;
}
#clock-time {
  font-size:22px; font-weight:700; letter-spacing:3px;
  font-family:monospace; line-height:1;
}
#clock-date { font-size:10px; color:rgba(255,255,255,.35); }

/* ── ANIMATIONS ─────────────────────────────────────────────── */
@-webkit-keyframes spin  { to { -webkit-transform:rotate(360deg); transform:rotate(360deg); } }
@keyframes           spin  { to { -webkit-transform:rotate(360deg); transform:rotate(360deg); } }
@-webkit-keyframes pulse { 0%,100%{opacity:1;-webkit-transform:scale(1);transform:scale(1)} 50%{opacity:.3;-webkit-transform:scale(.7);transform:scale(.7)} }
@keyframes           pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }
</style>
</head>
<body>

<!-- LOGO & RELOJ -->
<div id="tv-logo">🇨🇱 TV CHILE</div>
<div id="clock-box">
  <div id="clock-time">00:00</div>
  <div id="clock-date">...</div>
</div>

<!-- VIDEO -->
<video id="player" autoplay playsinline webkit-playsinline
       x-webkit-airplay="allow"></video>

<!-- LOADING -->
<div id="loading">
  <div id="spinner"></div>
  <div id="loading-ch">CARGANDO...</div>
</div>

<!-- ERROR -->
<div id="error-box">
  <div style="font-size:52px">📡</div>
  <div id="error-msg">No se pudo cargar el canal.<br>Puede estar temporalmente no disponible.</div>
  <button id="retry-btn" onclick="retryStream()">↺ REINTENTAR</button>
</div>

<!-- BADGE "ahora viendo" -->
<div id="now-badge">
  <div id="now-badge-inner">
    <div class="live-dot"></div>
    <div>
      <div id="badge-num">CH 02</div>
      <div id="badge-name">24 Horas</div>
    </div>
    <div id="badge-live">EN VIVO</div>
  </div>
</div>

<!-- CANAL OVERLAY (al navegar) -->
<div id="ch-overlay">
  <div id="ch-strip"></div>
</div>

<script>
// ─── CANALES ──────────────────────────────────────────────────────────────────
var CHANNELS = [
  { id:'mega',    number:'09',   name:'Mega',        sub:'Meganoticias En Vivo',   cat:'NOTICIAS',    accent:'#FF4500',
    urls:['https://pantera1-100gb-cl-movistar.dps.live/mega/mega.smil/playlist.m3u8',
          'https://redirector.rudo.video/hls-video/mega/mega.smil/playlist.m3u8'] },
  { id:'t13',     number:'13',   name:'T13',         sub:'Canal 13 En Vivo',       cat:'NOTICIAS',    accent:'#E8001C',
    urls:['https://redirector.rudo.video/hls-video/10b92cafdf3646cbc1e727f3dc76863621a327fd/t13/t13.smil/playlist.m3u8',
          'https://jireh-4-hls-video-cl-isp.dps.live/hls-video/10b92cafdf3646cbc1e727f3dc76863621a327fd/t13/t13.smil/playlist_900.m3u8'] },
  { id:'chv',     number:'11',   name:'CHV',         sub:'Chilevisión En Vivo',    cat:'ENTRETENCIÓN',accent:'#00C853',
    urls:['https://mdstrm.com/live-stream-playlist/6491ced935a5833c47dd7f41.m3u8'] },
  { id:'cnn',     number:'CNN',  name:'CNN Chile',   sub:'Noticias 24 Horas',      cat:'NOTICIAS 24H',accent:'#FF2222',
    urls:['https://redirector.rudo.video/hls-video/lvcl5/cnn/cnn.smil/playlist.m3u8',
          'https://jireh-4-hls-video-cl-isp.dps.live/hls-video/lvcl5/cnn/cnn.smil/playlist.m3u8'] },
  { id:'chv-d',   number:'11D',  name:'CHV Dep.',    sub:'Fútbol Nacional',        cat:'DEPORTES',    accent:'#76FF03',
    urls:['https://mdstrm.com/live-stream-playlist/6491ced935a5833c47dd7f41.m3u8'] },
  { id:'13dep',   number:'13D',  name:'13 FutGO',    sub:'Canal 13 Deportes',      cat:'DEPORTES',    accent:'#FF6D00',
    urls:['https://redirector.rudo.video/hls-video/10b92cafdf3646cbc1e727f3dc76863621a327fd/t13/t13.smil/playlist.m3u8'] },
  { id:'mega-d',  number:'09D',  name:'Mega Dep.',   sub:'Mega Deportes',          cat:'DEPORTES',    accent:'#FF9100',
    urls:['https://pantera1-100gb-cl-movistar.dps.live/mega/mega.smil/playlist.m3u8'] },
  { id:'coop',    number:'COOP', name:'Cooperativa', sub:'Radio Cooperativa TV',   cat:'RADIO TV',    accent:'#AA44FF',
    urls:['https://unlimited1-cl-isp.dps.live/coopetv/coopetv.smil/playlist.m3u8'] },
  { id:'bio',     number:'BIO',  name:'Bío Bío',     sub:'Radio Biobío TV',        cat:'RADIO TV',    accent:'#00A8E8',
    urls:['https://redirector.rudo.video/hls-video/339f69c6122f6d8f4574732c235f09b7683e31a5/bbtv/bbtv.smil/playlist.m3u8'] },
  { id:'agr',     number:'AGR',  name:'Agricultura', sub:'Radio Agricultura TV',   cat:'RADIO TV',    accent:'#5CB800',
    urls:['https://unlimited2-cl-isp.dps.live/921tv/921tv.smil/playlist.m3u8',
          'https://redirector.rudo.video/hls-video/ey6283je82983je9823je8jowowiekldk9838274/921tv/921tv.smil/playlist.m3u8'] },
];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
var activeIdx   = 0;
var focusedIdx  = 0;
var urlAttempt  = 0;
var overlayTimer = null;
var overlayVisible = false;
var hls = null;

var video      = document.getElementById('player');
var loading    = document.getElementById('loading');
var errorBox   = document.getElementById('error-box');
var loadingCh  = document.getElementById('loading-ch');
var chOverlay  = document.getElementById('ch-overlay');
var chStrip    = document.getElementById('ch-strip');
var badgeNum   = document.getElementById('badge-num');
var badgeName  = document.getElementById('badge-name');
var badgeLive  = document.getElementById('badge-live');
var nowBadge   = document.getElementById('now-badge');

// ─── RELOJ ────────────────────────────────────────────────────────────────────
function updateClock() {
  var now = new Date();
  var hh  = ('0'+now.getHours()).slice(-2);
  var mm  = ('0'+now.getMinutes()).slice(-2);
  var days   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  document.getElementById('clock-time').textContent = hh+':'+mm;
  document.getElementById('clock-date').textContent =
    days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()];
}
updateClock();
setInterval(updateClock, 1000);

// ─── CONSTRUIR STRIP DE CANALES ───────────────────────────────────────────────
function buildStrip() {
  chStrip.innerHTML = '';
  // Mostrar ventana de canales centrada en el enfocado
  // Siempre generamos todos, el scroll lo hacemos con transform
  for (var i = 0; i < CHANNELS.length; i++) {
    var ch = CHANNELS[i];
    var div = document.createElement('div');
    div.className = 'ch-card' +
      (i === focusedIdx ? ' focused' : '') +
      (i === activeIdx  ? ' active-ch' : '');
    div.dataset.idx = i;
    div.style.borderBottom = '2px solid transparent';
    div.innerHTML =
      '<div class="ch-card-top">'+
        '<span class="ch-card-num" style="color:'+ch.accent+'">CH '+ch.number+'</span>'+
        '<span class="ch-card-cat">'+ch.cat+'</span>'+
      '</div>'+
      '<div class="ch-card-name">'+ch.name+'</div>'+
      '<div class="ch-card-sub">'+ch.sub+'</div>'+
      '<div class="ch-card-line" style="'+(i===focusedIdx?'background:'+ch.accent:'')+'"></div>';
    (function(idx){ div.addEventListener('click', function(){ selectChannel(idx); }); })(i);
    chStrip.appendChild(div);
  }
  scrollStrip();
}

function scrollStrip() {
  // Centrar el canal enfocado en pantalla
  var cardW   = 180;
  var viewW   = window.innerWidth;
  var offset  = Math.round(viewW/2 - focusedIdx * cardW - cardW/2);
  chStrip.style.webkitTransform = 'translateX('+offset+'px)';
  chStrip.style.transform       = 'translateX('+offset+'px)';
}

// ─── ACTUALIZAR BADGE ────────────────────────────────────────────────────────
function updateBadge(ch) {
  badgeNum.textContent  = 'CH '+ch.number;
  badgeName.textContent = ch.name;
  badgeLive.style.color = ch.accent;
  nowBadge.querySelector('.live-dot').style.background   = ch.accent;
  nowBadge.querySelector('.live-dot').style.webkitBoxShadow = '0 0 6px '+ch.accent;
  nowBadge.querySelector('.live-dot').style.boxShadow    = '0 0 6px '+ch.accent;
  document.getElementById('now-badge-inner').style.borderLeftColor = ch.accent;
  // Color del spinner y loading text
  document.getElementById('spinner').style.borderTopColor = ch.accent;
  loadingCh.style.color = ch.accent;
}

// ─── MOSTRAR / OCULTAR OVERLAY ────────────────────────────────────────────────
function showOverlay() {
  overlayVisible = true;
  chOverlay.className = 'visible';
  // Ocultar badge mientras el overlay está visible
  nowBadge.style.opacity = '0';
  resetOverlayTimer();
}

function hideOverlay() {
  overlayVisible = false;
  chOverlay.className = '';
  nowBadge.style.opacity = '1';
}

function resetOverlayTimer() {
  if (overlayTimer) clearTimeout(overlayTimer);
  overlayTimer = setTimeout(hideOverlay, 3500);
}

// ─── CARGAR STREAM ────────────────────────────────────────────────────────────
function selectChannel(idx) {
  activeIdx  = idx;
  focusedIdx = idx;
  urlAttempt = 0;
  hideOverlay();
  buildStrip();
  loadStream();
}

function retryStream() {
  urlAttempt = 0;
  loadStream();
}

function loadStream() {
  var ch  = CHANNELS[activeIdx];
  var url = ch.urls[urlAttempt] || ch.urls[0];

  errorBox.className = '';
  loading.className  = '';
  loadingCh.textContent = 'SINTONIZANDO '+ch.name.toUpperCase()+'...';
  updateBadge(ch);

  // Destruir HLS anterior
  if (hls) { try { hls.destroy(); } catch(e){} hls = null; }
  video.src = '';
  video.load();

  function onFatalError() {
    var ch = CHANNELS[activeIdx];
    if (urlAttempt + 1 < ch.urls.length) {
      urlAttempt++;
      loadStream();
    } else {
      loading.className = 'hide';
      errorBox.className = 'show';
    }
  }

  // Samsung TV soporta HLS nativo — intentar primero sin HLS.js
  if (video.canPlayType('application/vnd.apple.mpegurl') ||
      video.canPlayType('application/x-mpegURL')) {
    // HLS nativo (Safari, Samsung TV, LG TV)
    video.src = url;
    video.load();
    var nativeLoaded = false;
    video.oncanplay = function() {
      if (nativeLoaded) return; nativeLoaded = true;
      loading.className = 'hide';
      video.play();
    };
    video.onerror = function() { onFatalError(); };
    // Timeout fallback a HLS.js si no carga en 8s
    setTimeout(function() {
      if (!nativeLoaded && typeof Hls !== 'undefined' && Hls.isSupported()) {
        video.oncanplay = null; video.onerror = null;
        loadWithHlsJs(url, onFatalError);
      }
    }, 8000);

  } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    loadWithHlsJs(url, onFatalError);
  } else {
    loading.className = 'hide';
    errorBox.className = 'show';
    document.getElementById('error-msg').textContent =
      'Tu navegador no soporta reproducción HLS.\nIntenta actualizar el navegador.';
  }
}

function loadWithHlsJs(url, onError) {
  hls = new Hls({
    liveSyncDurationCount: 3,
    liveMaxLatencyDurationCount: 10,
    maxBufferLength: 20,
    enableWorker: false, // más compatible con TVs antiguas
  });
  hls.loadSource(url);
  hls.attachMedia(video);
  hls.on(Hls.Events.MANIFEST_PARSED, function() {
    loading.className = 'hide';
    video.play();
  });
  hls.on(Hls.Events.ERROR, function(evt, data) {
    if (data.fatal) { onError(); }
  });
}

// ─── NAVEGACIÓN CON CONTROL REMOTO ───────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  var key = e.key || e.keyCode;

  // ARRIBA → canal anterior
  if (key === 'ArrowUp' || key === 38) {
    e.preventDefault();
    if (overlayVisible) {
      // Navegar en el overlay
      if (focusedIdx > 0) {
        focusedIdx--;
        buildStrip();
        resetOverlayTimer();
      }
    } else {
      // Canal anterior directo
      var next = activeIdx > 0 ? activeIdx - 1 : CHANNELS.length - 1;
      selectChannel(next);
    }
    return;
  }

  // ABAJO → canal siguiente
  if (key === 'ArrowDown' || key === 40) {
    e.preventDefault();
    if (overlayVisible) {
      if (focusedIdx < CHANNELS.length - 1) {
        focusedIdx++;
        buildStrip();
        resetOverlayTimer();
      }
    } else {
      var next = activeIdx < CHANNELS.length - 1 ? activeIdx + 1 : 0;
      selectChannel(next);
    }
    return;
  }

  // IZQUIERDA → canal anterior (en overlay navega, fuera abre overlay)
  if (key === 'ArrowLeft' || key === 37) {
    e.preventDefault();
    if (!overlayVisible) {
      focusedIdx = activeIdx;
      buildStrip();
      showOverlay();
    } else {
      if (focusedIdx > 0) { focusedIdx--; buildStrip(); resetOverlayTimer(); }
    }
    return;
  }

  // DERECHA → en overlay navega, fuera abre overlay
  if (key === 'ArrowRight' || key === 39) {
    e.preventDefault();
    if (!overlayVisible) {
      focusedIdx = activeIdx;
      buildStrip();
      showOverlay();
    } else {
      if (focusedIdx < CHANNELS.length - 1) { focusedIdx++; buildStrip(); resetOverlayTimer(); }
    }
    return;
  }

  // OK / ENTER → sintonizar canal enfocado
  if (key === 'Enter' || key === 13 || key === ' ' || key === 'Select') {
    e.preventDefault();
    if (overlayVisible) {
      selectChannel(focusedIdx);
    } else {
      // Mostrar overlay
      focusedIdx = activeIdx;
      buildStrip();
      showOverlay();
    }
    return;
  }

  // ATRÁS / ESC → ocultar overlay
  if (key === 'Escape' || key === 27 || key === 'GoBack' || key === 'Back' || key === 10009) {
    e.preventDefault();
    if (overlayVisible) hideOverlay();
    return;
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildStrip();
selectChannel(0);
</script>
</body>
</html>
